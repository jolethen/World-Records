<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiCraft World Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; }
        .navbar { background-color: #1a1a1a; border-bottom: 2px solid #00bc8c; }
        .tier-S { border-left: 5px solid #ffcc00 !important; } /* Gold */
        .tier-A { border-left: 5px solid #c0c0c0 !important; } /* Silver */
        .record-card { background: #1a1a1a; border: 1px solid #333; transition: 0.3s; }
        .submit-box { background: #161616; border: 1px dashed #444; border-radius: 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-5 shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🏆 MultiCraft Records</a>
    </div>
</nav>

<div class="container">
    <div id="records-container" class="row g-4 mb-5">
        </div>

    <div id="submit" class="p-4 submit-box mb-5 text-center">
        <h3 class="text-info">New Record?</h3>
        <p>Copy this template and paste it in our Discord!</p>
        <div class="bg-black p-3 rounded mb-3 text-start mx-auto" style="max-width: 400px;">
            <code id="tmpl">**Category:** <br>**Title:** <br>**Value:** <br>**Holder:** <br>**Tier:** [S/A/B]<br>**Proof:** </code>
        </div>
        <button class="btn btn-sm btn-outline-light" onclick="navigator.clipboard.writeText(document.getElementById('tmpl').innerText)">Copy Template</button>
    </div>
</div>

<script>
    async function loadRecords() {
        const response = await fetch('data.json');
        const records = await response.json();
        const container = document.getElementById('records-container');
        
        records.forEach(r => {
            container.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="card record-card p-3 h-100 tier-${r.tier || 'B'}">
                        <div class="d-flex justify-content-between align-items-start">
                            <span class="badge bg-dark text-info border border-info">${r.category}</span>
                            <span class="fw-bold text-warning">${r.tier || ''}</span>
                        </div>
                        <h4 class="mt-2 h5">${r.title}</h4>
                        <div class="display-6 fw-bold text-white mb-2">${r.value}</div>
                        <div class="d-flex justify-content-between align-items-center mt-auto">
                            <span class="text-muted small">👤 ${r.holder}</span>
                            <a href="${r.proof}" target="_blank" class="btn btn-sm btn-link text-decoration-none p-0">View Proof →</a>
                        </div>
                    </div>
                </div>`;
        });
    }
    loadRecords();
</script>
</body>
  </html>
